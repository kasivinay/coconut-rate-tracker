<!DOCTYPE html>
<html>

<head>

    <title>Admin Dashboard</title>

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center">

    <h1>
        Admin Dashboard
    </h1>

    <a href="/logout"
       class="btn btn-danger">

        Logout

    </a>

</div>
    <hr>

    <div class="card p-4 shadow">

        <h3>Add Coconut Rate</h3>

        {% if edit_rate %}

<form action="/admin/update-rate/{{ edit_rate.id }}"
      method="POST">

{% else %}

<form action="/admin/add-rate"
      method="POST">

{% endif %}

            <div class="mb-3">

                <label>Date</label>

                <input
                type="date"
                name="date"
                class="form-control"
                value="{{ edit_rate.date if edit_rate else '' }}"
                required>

            </div>

            <div class="mb-3">

                <label>Market</label>

                    <select name="market" class="form-control">

                    <option>Ambajipeta</option>
                    <option>Amalapuram</option>
                        value="{{ edit_rate.rate_per_coconut if edit_rate else '' }}"

</select>

            </div>

            <div class="mb-3">

                <label>Rate</label>

                <input
                type="number"
                step="0.01"
                name="rate"
                class="form-control"
                value="{{ edit_rate.rate_per_coconut if edit_rate else '' }}"
                required>

            </div>

            <div class="mb-3">

                <label>Remarks</label>

                <input
                type="text"
                name="remarks"
                class="form-control"
                value="{{ edit_rate.remarks if edit_rate else '' }}""
                required>

            </div>

           <button
    type="submit"
    class="btn btn-success">

    {% if edit_rate %}
        Update Rate
    {% else %}
        Save Rate
    {% endif %}

</button>

        </form>

    </div>

    <hr>

    <h3>Existing Rates</h3>

    <table class="table table-bordered">

        <thead>

            <tr>

                <th>ID</th>
                <th>Date</th>
                <th>Market</th>
                <th>Rate</th>
                <th>Remarks</th>
                <th>Actions</th>

            </tr>

        </thead>

        <tbody>

        {% for rate in rates %}

            <tr>

                <td>{{ rate.id }}</td>

                <td>{{ rate.date }}</td>

                <td>{{ rate.market }}</td>

                <td>₹{{ rate.rate_per_coconut }}</td>

                <td>{{ rate.remarks }}</td>
                <td>

    <a href="/admin/edit-rate/{{ rate.id }}"
       class="btn btn-warning btn-sm">

        Edit

    </a>

    <a href="/admin/delete-rate/{{ rate.id }}"
   class="btn btn-danger btn-sm"
   onclick="return confirm('Are you sure you want to delete this rate?')">

   Delete

</a>

</td>

            </tr>

        {% endfor %}

        </tbody>

    </table>

</div>

</body>

</html>
